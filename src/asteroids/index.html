<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .score {
            font-size: 24px;
        }
        .game-over {
            position: absolute;
            display: none;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border: 1px solid #fff;
        }
        .game-over h2 {
            font-size: 48px;
            margin: 0 0 20px 0;
        }
        .game-over p {
            font-size: 18px;
        }
        .restart-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .restart-btn:hover {
            background: #ccc;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            color: #888;
            font-size: 14px;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border: 1px solid white;
            border-radius: 5px;
            font-family: inherit;
            z-index: 1000;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">← Back to Arcade</a>
    <div class="ui">
        <div class="score">Score: <span id="scoreVal">0</span></div>
    </div>

    <div id="gameOver" class="game-over">
        <h2>GAME OVER</h2>
        <p>Your score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="resetGame()">RESTART</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        UP: Thrust | LEFT/RIGHT: Rotate | SPACE: Shoot
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');

        canvas.width = 800;
        canvas.height = 600;

        const FPS = 60;
        const SHIP_SIZE = 20;
        const TURN_SPEED = 360; // degrees per second
        const SHIP_THRUST = 5; // acceleration px/s
        const FRICTION = 0.7; // friction coefficient (0 = none, 1 = a lot)
        const LASER_MAX = 10; // max lasers on screen
        const LASER_SPD = 500; // pixels per second
        const LASER_DIST = 0.6; // max distance laser can travel (fraction of screen width)
        const ASTEROID_NUM = 3; // starting number of asteroids
        const ASTEROID_SIZE = 100; // starting size in pixels
        const ASTEROID_SPD = 50; // max starting speed in pixels per second
        const ASTEROID_VERT = 10; // average number of vertices on each asteroid
        const ASTEROID_JAG = 0.4; // jaggedness of asteroids (0 = none, 1 = lots)

        let score, ship, asteroids, lasers, gameRunning;

        function resetGame() {
            score = 0;
            scoreElement.innerText = score;
            gameOverElement.style.display = 'none';
            gameRunning = true;
            
            ship = newShip();
            asteroids = [];
            lasers = [];
            createAsteroidBelt();
            
            requestAnimationFrame(update);
        }

        function newShip() {
            return {
                x: canvas.width / 2,
                y: canvas.height / 2,
                r: SHIP_SIZE / 2,
                a: 90 / 180 * Math.PI, // convert to radians
                rot: 0,
                thrusting: false,
                thrust: { x: 0, y: 0 },
                dead: false
            };
        }

        function createAsteroidBelt() {
            asteroids = [];
            for (let i = 0; i < ASTEROID_NUM; i++) {
                let x, y;
                do {
                    x = Math.floor(Math.random() * canvas.width);
                    y = Math.floor(Math.random() * canvas.height);
                } while (distBetweenPoints(ship.x, ship.y, x, y) < ASTEROID_SIZE * 2 + ship.r);
                asteroids.push(newAsteroid(x, y, Math.ceil(ASTEROID_SIZE / 2)));
            }
        }

        function newAsteroid(x, y, r) {
            let lvlMult = 1 + score * 0.001;
            let asteroid = {
                x: x,
                y: y,
                xv: Math.random() * ASTEROID_SPD * lvlMult / FPS * (Math.random() < 0.5 ? 1 : -1),
                yv: Math.random() * ASTEROID_SPD * lvlMult / FPS * (Math.random() < 0.5 ? 1 : -1),
                r: r,
                a: Math.random() * Math.PI * 2,
                vert: Math.floor(Math.random() * (ASTEROID_VERT + 1) + ASTEROID_VERT / 2),
                offs: []
            };
            for (let i = 0; i < asteroid.vert; i++) {
                asteroid.offs.push(Math.random() * ASTEROID_JAG * 2 + 1 - ASTEROID_JAG);
            }
            return asteroid;
        }

        function distBetweenPoints(x1, y1, x2, y2) {
            return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
        }

        document.addEventListener('keydown', keyDown);
        document.addEventListener('keyup', keyUp);

        function keyDown(ev) {
            if (!gameRunning) return;
            switch(ev.keyCode) {
                case 32: // space (shoot)
                    shootLaser();
                    break;
                case 37: // left
                    ship.rot = TURN_SPEED / 180 * Math.PI / FPS;
                    break;
                case 38: // up
                    ship.thrusting = true;
                    break;
                case 39: // right
                    ship.rot = -TURN_SPEED / 180 * Math.PI / FPS;
                    break;
            }
        }

        function keyUp(ev) {
            if (!gameRunning) return;
            switch(ev.keyCode) {
                case 37: // left
                    ship.rot = 0;
                    break;
                case 38: // up
                    ship.thrusting = false;
                    break;
                case 39: // right
                    ship.rot = 0;
                    break;
            }
        }

        function shootLaser() {
            if (lasers.length < LASER_MAX) {
                lasers.push({
                    x: ship.x + 4 / 3 * ship.r * Math.cos(ship.a),
                    y: ship.y - 4 / 3 * ship.r * Math.sin(ship.a),
                    xv: LASER_SPD * Math.cos(ship.a) / FPS,
                    yv: -LASER_SPD * Math.sin(ship.a) / FPS,
                    dist: 0
                });
            }
        }

        function update() {
            if (!gameRunning) return;

            // Draw Space
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Thrust the ship
            if (ship.thrusting) {
                ship.thrust.x += SHIP_THRUST * Math.cos(ship.a) / FPS;
                ship.thrust.y -= SHIP_THRUST * Math.sin(ship.a) / FPS;

                // Draw thrust
                ctx.strokeStyle = "yellow";
                ctx.lineWidth = SHIP_SIZE / 10;
                ctx.beginPath();
                ctx.moveTo(
                    ship.x - ship.r * (2/3 * Math.cos(ship.a) + 0.5 * Math.sin(ship.a)),
                    ship.y + ship.r * (2/3 * Math.sin(ship.a) - 0.5 * Math.cos(ship.a))
                );
                ctx.lineTo(
                    ship.x - ship.r * 6/3 * Math.cos(ship.a),
                    ship.y + ship.r * 6/3 * Math.sin(ship.a)
                );
                ctx.lineTo(
                    ship.x - ship.r * (2/3 * Math.cos(ship.a) - 0.5 * Math.sin(ship.a)),
                    ship.y + ship.r * (2/3 * Math.sin(ship.a) + 0.5 * Math.cos(ship.a))
                );
                ctx.stroke();
            } else {
                ship.thrust.x -= FRICTION * ship.thrust.x / FPS;
                ship.thrust.y -= FRICTION * ship.thrust.y / FPS;
            }

            // Draw Ship
            ctx.strokeStyle = "white";
            ctx.lineWidth = SHIP_SIZE / 10;
            ctx.beginPath();
            ctx.moveTo(
                ship.x + 4 / 3 * ship.r * Math.cos(ship.a),
                ship.y - 4 / 3 * ship.r * Math.sin(ship.a)
            );
            ctx.lineTo(
                ship.x - ship.r * (2 / 3 * Math.cos(ship.a) + Math.sin(ship.a)),
                ship.y + ship.r * (2 / 3 * Math.sin(ship.a) - Math.cos(ship.a))
            );
            ctx.lineTo(
                ship.x - ship.r * (2 / 3 * Math.cos(ship.a) - Math.sin(ship.a)),
                ship.y + ship.r * (2 / 3 * Math.sin(ship.a) + Math.cos(ship.a))
            );
            ctx.closePath();
            ctx.stroke();

            // Draw Asteroids
            ctx.strokeStyle = "slategrey";
            ctx.lineWidth = SHIP_SIZE / 10;
            asteroids.forEach(ast => {
                ctx.beginPath();
                ctx.moveTo(
                    ast.x + ast.r * ast.offs[0] * Math.cos(ast.a),
                    ast.y + ast.r * ast.offs[0] * Math.sin(ast.a)
                );
                for (let j = 1; j < ast.vert; j++) {
                    ctx.lineTo(
                        ast.x + ast.r * ast.offs[j] * Math.cos(ast.a + j * Math.PI * 2 / ast.vert),
                        ast.y + ast.r * ast.offs[j] * Math.sin(ast.a + j * Math.PI * 2 / ast.vert)
                    );
                }
                ctx.closePath();
                ctx.stroke();
            });

            // Draw Lasers
            ctx.fillStyle = "salmon";
            lasers.forEach((laser, i) => {
                ctx.beginPath();
                ctx.arc(laser.x, laser.y, SHIP_SIZE / 15, 0, Math.PI * 2, false);
                ctx.fill();
            });

            // Detect Laser hits on Asteroids
            for (let i = asteroids.length - 1; i >= 0; i--) {
                let ax = asteroids[i].x;
                let ay = asteroids[i].y;
                let ar = asteroids[i].r;

                for (let j = lasers.length - 1; j >= 0; j--) {
                    let lx = lasers[j].x;
                    let ly = lasers[j].y;
                    if (distBetweenPoints(ax, ay, lx, ly) < ar) {
                        // Destroy asteroid and laser
                        destroyAsteroid(i);
                        lasers.splice(j, 1);
                        break;
                    }
                }
            }

            // Detect Asteroid hits on Ship
            asteroids.forEach(ast => {
                if (distBetweenPoints(ship.x, ship.y, ast.x, ast.y) < ship.r + ast.r) {
                    gameOver();
                }
            });

            function destroyAsteroid(index) {
                let x = asteroids[index].x;
                let y = asteroids[index].y;
                let r = asteroids[index].r;

                if (r === Math.ceil(ASTEROID_SIZE / 2)) {
                    asteroids.push(newAsteroid(x, y, Math.ceil(ASTEROID_SIZE / 4)));
                    asteroids.push(newAsteroid(x, y, Math.ceil(ASTEROID_SIZE / 4)));
                    score += 20;
                } else if (r === Math.ceil(ASTEROID_SIZE / 4)) {
                    asteroids.push(newAsteroid(x, y, Math.ceil(ASTEROID_SIZE / 8)));
                    asteroids.push(newAsteroid(x, y, Math.ceil(ASTEROID_SIZE / 8)));
                    score += 50;
                } else {
                    score += 100;
                }
                asteroids.splice(index, 1);
                scoreElement.innerText = score;

                if (asteroids.length === 0) {
                    createAsteroidBelt();
                }
            }

            function gameOver() {
                gameRunning = false;
                finalScoreElement.innerText = score;
                gameOverElement.style.display = 'block';
            }

            // Move ship
            ship.a += ship.rot;
            ship.x += ship.thrust.x;
            ship.y += ship.thrust.y;

            // Handle screen wrap
            if (ship.x < 0 - ship.r) ship.x = canvas.width + ship.r;
            else if (ship.x > canvas.width + ship.r) ship.x = 0 - ship.r;
            if (ship.y < 0 - ship.r) ship.y = canvas.height + ship.r;
            else if (ship.y > canvas.height + ship.r) ship.y = 0 - ship.r;

            // Move lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                // distance traveled
                lasers[i].dist += Math.sqrt(Math.pow(lasers[i].xv, 2) + Math.pow(lasers[i].yv, 2));
                
                // wrap laser
                lasers[i].x += lasers[i].xv;
                lasers[i].y += lasers[i].yv;
                if (lasers[i].x < 0) lasers[i].x = canvas.width;
                else if (lasers[i].x > canvas.width) lasers[i].x = 0;
                if (lasers[i].y < 0) lasers[i].y = canvas.height;
                else if (lasers[i].y > canvas.height) lasers[i].y = 0;

                if (lasers[i].dist > LASER_DIST * canvas.width) {
                    lasers.splice(i, 1);
                }
            }

            // Move asteroids
            asteroids.forEach(ast => {
                ast.x += ast.xv;
                ast.y += ast.yv;
                if (ast.x < 0 - ast.r) ast.x = canvas.width + ast.r;
                else if (ast.x > canvas.width + ast.r) ast.x = 0 - ast.r;
                if (ast.y < 0 - ast.r) ast.y = canvas.height + ast.r;
                else if (ast.y > canvas.height + ast.r) ast.y = 0 - ast.r;
            });

            requestAnimationFrame(update);
        }

        resetGame();
    </script>
</body>
</html>
