<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Power-Ups</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #70c5ce;
            color: white;
            font-family: 'Arial', sans-serif;
            flex-direction: column;
            overflow: hidden;
        }
        canvas {
            border: 5px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            background-color: #70c5ce;
            border-radius: 10px;
            cursor: pointer;
        }
        .stats {
            position: absolute;
            top: 20px;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 0 #000;
            z-index: 5;
            pointer-events: none;
        }
        #activePowerUp {
            position: absolute;
            top: 80px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            z-index: 5;
            pointer-events: none;
            text-align: center;
            width: 100%;
            display: none;
        }
        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        #gameOver h1 {
            font-size: 60px;
            color: #f1c40f;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0 #000;
        }
        #gameOver p {
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #000;
        }
        #gameOver button {
            padding: 15px 40px;
            font-size: 24px;
            cursor: pointer;
            background-color: #e67e22;
            border: 4px solid #fff;
            color: white;
            border-radius: 10px;
            transition: transform 0.1s;
            box-shadow: 0 5px 0 #a04000;
        }
        #gameOver button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #a04000;
        }
        #highScore {
            margin-top: 20px;
            font-size: 22px;
            text-shadow: 2px 2px 0 #000;
        }
        .instructions {
            margin-top: 15px;
            font-size: 18px;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
        }
    </style>
</head>
<body>
    <div class="stats" id="score">0</div>
    <div id="activePowerUp">GHOST MODE!</div>
    <div id="gameOver">
        <h1>GAME OVER</h1>
        <p>Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
        <div id="highScore">High Score: <span id="highScoreValue">0</span></div>
    </div>
    <canvas id="flappyGame" width="360" height="640"></canvas>
    <div class="instructions">Press Space or Click to Flap!</div>

    <script>
        const canvas = document.getElementById("flappyGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const activePowerUpElement = document.getElementById("activePowerUp");
        const gameOverScreen = document.getElementById("gameOver");
        const finalScoreElement = document.getElementById("finalScore");
        const highScoreValueElement = document.getElementById("highScoreValue");

        // Game Constants
        const GRAVITY = 0.25;
        const FLAP_STRENGTH = -5;
        const BASE_PIPE_SPEED = 2.5;
        const PIPE_SPAWN_RATE = 2200; // ms - Increased to make pipes farther apart
        const PIPE_WIDTH = 60;
        const PIPE_GAP = 160;

        // Power-Up Types
        const POWERUPS = {
            GHOST: { color: '#3498db', label: 'GHOST MODE!', duration: 5000 },
            SPEED: { color: '#e74c3c', label: 'SPEED BOOST!', duration: 5000 }
        };

        // Game State
        let bird = { x: 50, y: 320, velocity: 0, radius: 15, rotation: 0 };
        let pipes = [];
        let powerUps = [];
        let score = 0;
        let isGameOver = false;
        let isStarted = false;
        let lastPipeSpawn = 0;
        let lastPowerUpSpawn = 0;
        let activePowerUp = null; // { type, endTime }
        let currentPipeSpeed = BASE_PIPE_SPEED;

        function initGame() {
            bird = { x: 50, y: 320, velocity: 0, radius: 15, rotation: 0 };
            pipes = [];
            powerUps = [];
            score = 0;
            isGameOver = false;
            isStarted = false;
            activePowerUp = null;
            currentPipeSpeed = BASE_PIPE_SPEED;
            scoreElement.innerHTML = score;
            activePowerUpElement.style.display = "none";
            gameOverScreen.style.display = "none";
            
            draw();
        }

        function flap() {
            if (isGameOver) return;
            if (!isStarted) {
                isStarted = true;
                requestAnimationFrame(gameLoop);
            }
            bird.velocity = FLAP_STRENGTH;
        }

        window.addEventListener("keydown", (e) => { if(e.code === "Space") flap(); });
        canvas.addEventListener("mousedown", flap);

        function spawnPipe() {
            const minPipeHeight = 50;
            const maxPipeHeight = canvas.height - PIPE_GAP - minPipeHeight - 50;
            const height = Math.floor(Math.random() * (maxPipeHeight - minPipeHeight + 1)) + minPipeHeight;
            
            pipes.push({
                x: canvas.width,
                topHeight: height,
                passed: false
            });
        }

        function spawnPowerUp() {
            const types = Object.keys(POWERUPS);
            const type = types[Math.floor(Math.random() * types.length)];
            
            // To ensure the power-up is reachable and not in a pipe,
            // we spawn it relative to the most recent pipe.
            if (pipes.length === 0) {
                // If no pipes yet, spawn in a safe middle area
                powerUps.push({
                    x: canvas.width + 200,
                    y: canvas.height / 2,
                    type: type,
                    radius: 15
                });
                return;
            }

            const lastPipe = pipes[pipes.length - 1];
            
            // Place the power-up inside the gap of the last spawned pipe
            // Gap center = lastPipe.topHeight + (PIPE_GAP / 2)
            const gapCenterY = lastPipe.topHeight + (PIPE_GAP / 2);
            
            // Randomize position slightly within the gap to keep it interesting
            const randomYOffset = (Math.random() - 0.5) * (PIPE_GAP * 0.6);
            const spawnY = gapCenterY + randomYOffset;
            
            // Spawn it a bit ahead of the pipe
            const spawnX = lastPipe.x + 20;

            powerUps.push({
                x: spawnX,
                y: spawnY,
                type: type,
                radius: 15
            });
        }

        function update(currentTime) {
            if (!isStarted || isGameOver) return;

            // Update active power-up timer
            if (activePowerUp) {
                if (currentTime > activePowerUp.endTime) {
                    activePowerUp = null;
                    currentPipeSpeed = BASE_PIPE_SPEED;
                    activePowerUpElement.style.display = "none";
                }
            }

            // Bird Physics
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;
            bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.velocity * 0.1));

            // Pipe Spawning
            const dynamicSpawnRate = PIPE_SPAWN_RATE * (BASE_PIPE_SPEED / currentPipeSpeed);
            if (currentTime - lastPipeSpawn > dynamicSpawnRate) {
                spawnPipe();
                lastPipeSpawn = currentTime;
            }

            // Power-Up Spawning (every 7-12 seconds)
            if (currentTime - lastPowerUpSpawn > 8000 + Math.random() * 4000) {
                spawnPowerUp();
                lastPowerUpSpawn = currentTime;
            }

            // Pipe Movement & Collision
            for (let i = pipes.length - 1; i >= 0; i--) {
                let p = pipes[i];
                p.x -= currentPipeSpeed;

                const birdRight = bird.x + bird.radius;
                const birdLeft = bird.x - bird.radius;
                const birdTop = bird.y - bird.radius;
                const birdBottom = bird.y + bird.radius;

                // Ghost Mode: Skip pipe collision
                if (activePowerUp?.type !== 'GHOST') {
                    if (birdRight > p.x && birdLeft < p.x + PIPE_WIDTH) {
                        if (birdTop < p.topHeight || birdBottom > p.topHeight + PIPE_GAP) {
                            endGame();
                        }
                    }
                }

                if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
                    score++;
                    scoreElement.innerHTML = score;
                    p.passed = true;
                }

                if (p.x + PIPE_WIDTH < 0) pipes.splice(i, 1);
            }

            // Power-Up Movement & Collection
            for (let i = powerUps.length - 1; i >= 0; i--) {
                let pu = powerUps[i];
                pu.x -= currentPipeSpeed;

                // Collection check
                const dx = bird.x - pu.x;
                const dy = bird.y - pu.y;
                const distance = Math.sqrt(dx*dx + dy*dy);

                if (distance < bird.radius + pu.radius) {
                    // Activate Power-Up
                    activePowerUp = {
                        type: pu.type,
                        endTime: currentTime + POWERUPS[pu.type].duration
                    };
                    
                    if (pu.type === 'SPEED') {
                        currentPipeSpeed = BASE_PIPE_SPEED * 1.8;
                    }
                    
                    activePowerUpElement.style.display = "block";
                    activePowerUpElement.innerHTML = POWERUPS[pu.type].label;
                    activePowerUpElement.style.color = POWERUPS[pu.type].color;
                    
                    powerUps.splice(i, 1);
                } else if (pu.x + pu.radius < 0) {
                    powerUps.splice(i, 1);
                }
            }

            if (bird.y + bird.radius > canvas.height - 50 || bird.y - bird.radius < 0) {
                endGame();
            }
        }

        function endGame() {
            isGameOver = true;
            finalScoreElement.innerHTML = score;
            let highScore = localStorage.getItem("flappyHighScore") || 0;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("flappyHighScore", highScore);
            }
            highScoreValueElement.innerHTML = highScore;
            gameOverScreen.style.display = "flex";
        }

        function draw() {
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Pipes
            pipes.forEach(p => {
                ctx.fillStyle = "#2ecc71";
                ctx.strokeStyle = "#27ae60";
                ctx.lineWidth = 4;
                ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topHeight);
                ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.topHeight);
                ctx.fillRect(p.x, p.topHeight + PIPE_GAP, PIPE_WIDTH, canvas.height - p.topHeight - PIPE_GAP);
                ctx.strokeRect(p.x, p.topHeight + PIPE_GAP, PIPE_WIDTH, canvas.height - p.topHeight - PIPE_GAP);
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(p.x - 5, p.topHeight - 20, PIPE_WIDTH + 10, 20);
                ctx.strokeRect(p.x - 5, p.topHeight - 20, PIPE_WIDTH + 10, 20);
                ctx.fillRect(p.x - 5, p.topHeight + PIPE_GAP, PIPE_WIDTH + 10, 20);
                ctx.strokeRect(p.x - 5, p.topHeight + PIPE_GAP, PIPE_WIDTH + 10, 20);
            });

            // Draw Power-Ups
            powerUps.forEach(pu => {
                ctx.fillStyle = POWERUPS[pu.type].color;
                ctx.beginPath();
                ctx.arc(pu.x, pu.y, pu.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Shine on power-up
                ctx.fillStyle = "rgba(255,255,255,0.5)";
                ctx.beginPath();
                ctx.arc(pu.x - 4, pu.y - 4, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Ground
            ctx.fillStyle = "#ded895";
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.fillStyle = "#73bf2e";
            ctx.fillRect(0, canvas.height - 60, canvas.width, 10);

            // Draw Bird
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation);
            
            // Power-up Aura
            if (activePowerUp) {
                ctx.beginPath();
                ctx.arc(0, 0, bird.radius + 5, 0, Math.PI * 2);
                ctx.fillStyle = POWERUPS[activePowerUp.type].color + "66"; // Transparent
                ctx.fill();
            }

            ctx.fillStyle = "#f1c40f";
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(7, -5, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(9, -5, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#e67e22";
            ctx.beginPath();
            ctx.moveTo(12, 0);
            ctx.lineTo(22, 5);
            ctx.lineTo(12, 10);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();

            if (!isStarted && !isGameOver) {
                ctx.fillStyle = "white";
                ctx.font = "24px Arial";
                ctx.textAlign = "center";
                ctx.fillText("CLICK TO START", canvas.width/2, canvas.height/2 + 50);
            }
        }

        function gameLoop(currentTime) {
            update(currentTime);
            draw();
            if (!isGameOver) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function restartGame() {
            initGame();
        }

        initGame();
    </script>
</body>
</html>
