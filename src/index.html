<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Game Arcade</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #95a5a6;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 90%;
            max-width: 1200px;
            padding: 2rem;
        }

        .game-card {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(233, 69, 96, 0.3);
        }

        .game-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
            filter: brightness(0.7);
            transition: filter 0.3s ease;
        }

        .game-card:hover .game-image {
            filter: brightness(0.9);
        }

        .game-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            text-align: center;
        }

        .game-title {
            font-size: 2rem;
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .play-btn {
            margin-top: 1rem;
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background-color: #e94560;
            color: white;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }

        .game-card:hover .play-btn {
            background-color: #ff5e78;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Game Arcade</h1>
        <p class="subtitle">Pick a game and start playing!</p>
    </header>

        <div class="game-container">
            <!-- Flappy Bird -->
            <a href="flappy-bird/index.html" class="game-card">
                <img src="assets/flappy-bird.png" alt="Flappy Bird" class="game-image">
                <div class="game-info">
                    <p class="game-title">Flappy Bird</p>
                    <div class="play-btn">Play Now</div>
                </div>
            </a>

            <!-- Snake -->
            <a href="snake/index.html" class="game-card">
                <img src="assets/snake.png" alt="Snake" class="game-image">
                <div class="game-info">
                    <p class="game-title">Snake</p>
                    <div class="play-btn">Play Now</div>
                </div>
            </a>

            <!-- Asteroids -->
            <a href="asteroids/index.html" class="game-card">
                <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=800&auto=format&fit=crop" alt="Asteroids" class="game-image">
                <div class="game-info">
                    <p class="game-title">Asteroids</p>
                    <div class="play-btn">Play Now</div>
                </div>
            </a>
        </div>

</body>
</html>
